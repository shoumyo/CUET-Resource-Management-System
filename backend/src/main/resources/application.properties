# ==========================================
# CUET Resource Booking System - Backend
# ==========================================

# Server
server.port=8080

# ==========================================
# MySQL DataSource
# ==========================================
spring.datasource.url=jdbc:mysql://localhost:3306/cuet_booking_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Dhaka
spring.datasource.username=root
spring.datasource.password=shoumyo20042004
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ==========================================
# JPA / Hibernate
# ==========================================
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.jdbc.time_zone=Asia/Dhaka
spring.jpa.defer-datasource-initialization=true

# ==========================================
# Data Initialization (seed)
# ==========================================
spring.sql.init.mode=never

# ==========================================
# JWT Configuration
# ==========================================
app.jwt.secret=cuet-booking-system-super-secret-key-2024-must-be-at-least-256-bits-long
app.jwt.expiration-ms=86400000

# ==========================================
# Scheduler
# ==========================================
spring.task.scheduling.enabled=true

# ==========================================
# CORS
# ==========================================
app.cors.allowed-origins=http://localhost:5173

# ==========================================
# Logging
# ==========================================
logging.level.com.cuet=DEBUG
logging.level.org.springframework.security=INFO
