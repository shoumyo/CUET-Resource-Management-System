<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CUET Resource Booking System</title>
    <meta name="description" content="Efficiently manage and reserve campus facilities, auditoriums, and academic resources at CUET through our secure, integrated platform." />
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
    <script>
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "surface-container-low": "#f4f3fa",
              "on-primary-fixed-variant": "#264191",
              "surface-tint": "#4059aa",
              "tertiary-fixed-dim": "#ffb691",
              "on-primary-fixed": "#00164e",
              "on-error-container": "#93000a",
              "outline": "#757682",
              "on-secondary-fixed-variant": "#404754",
              "surface-dim": "#dad9e1",
              "on-secondary-container": "#5e6572",
              "on-tertiary": "#ffffff",
              "primary": "#00236f",
              "on-primary-container": "#90a8ff",
              "on-background": "#1a1b21",
              "surface-bright": "#faf8ff",
              "inverse-on-surface": "#f1f0f7",
              "error": "#ba1a1a",
              "tertiary-fixed": "#ffdbcb",
              "outline-variant": "#c5c5d3",
              "surface-container-lowest": "#ffffff",
              "on-secondary": "#ffffff",
              "secondary-fixed-dim": "#c0c7d6",
              "primary-fixed-dim": "#b6c4ff",
              "on-tertiary-container": "#f39461",
              "background": "#faf8ff",
              "tertiary": "#4b1c00",
              "inverse-surface": "#2f3036",
              "tertiary-container": "#6e2c00",
              "on-tertiary-fixed-variant": "#773205",
              "on-secondary-fixed": "#151c27",
              "inverse-primary": "#b6c4ff",
              "surface-variant": "#e3e1e9",
              "primary-fixed": "#dce1ff",
              "on-surface-variant": "#444651",
              "surface-container": "#eeedf4",
              "on-error": "#ffffff",
              "on-primary": "#ffffff",
              "error-container": "#ffdad6",
              "primary-container": "#1e3a8a",
              "surface-container-high": "#e9e7ef",
              "secondary": "#585f6c",
              "secondary-container": "#dce2f3",
              "on-surface": "#1a1b21",
              "surface-container-highest": "#e3e1e9",
              "surface": "#faf8ff",
              "secondary-fixed": "#dce2f3",
              "on-tertiary-fixed": "#341100"
            },
            borderRadius: {
              "DEFAULT": "0.125rem",
              "lg": "0.25rem",
              "xl": "0.5rem",
              "full": "0.75rem"
            },
            spacing: {
              "margin-mobile": "16px",
              "unit": "4px",
              "sm": "8px",
              "md": "16px",
              "gutter": "20px",
              "lg": "24px",
              "xs": "4px",
              "xl": "32px",
              "margin-desktop": "40px"
            },
            fontFamily: {
              "display-lg": ["Inter"],
              "body-lg": ["Inter"],
              "headline-md": ["Inter"],
              "body-md": ["Inter"],
              "label-md": ["Inter"],
              "label-sm": ["Inter"],
              "headline-lg-mobile": ["Inter"],
              "headline-lg": ["Inter"]
            },
            fontSize: {
              "display-lg": ["36px", { lineHeight: "44px", letterSpacing: "-0.02em", fontWeight: "700" }],
              "body-lg": ["16px", { lineHeight: "24px", fontWeight: "400" }],
              "headline-md": ["20px", { lineHeight: "28px", fontWeight: "600" }],
              "body-md": ["14px", { lineHeight: "20px", fontWeight: "400" }],
              "label-md": ["12px", { lineHeight: "16px", letterSpacing: "0.05em", fontWeight: "500" }],
              "label-sm": ["11px", { lineHeight: "14px", fontWeight: "600" }],
              "headline-lg-mobile": ["20px", { lineHeight: "28px", fontWeight: "600" }],
              "headline-lg": ["24px", { lineHeight: "32px", letterSpacing: "-0.01em", fontWeight: "600" }]
            }
          }
        }
      }
    </script>
    <style>
      .material-symbols-outlined {
        font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
      }
      .material-symbols-outlined.fill {
        font-variation-settings: 'FILL' 1;
      }
      .card-level-1 { background-color: #FFFFFF; border: 1px solid #E5E7EB; border-radius: 0.25rem; }
      .card-level-1:hover { border-color: #D1D5DB; }
      .panel-level-2 { background-color: #FFFFFF; border-left: 1px solid #E5E7EB; box-shadow: 0px 4px 20px rgba(0,0,0,0.05); }
      .input-standard { border: 1px solid #E5E7EB; border-radius: 0.25rem; outline: none; }
      .input-standard:focus { border-color: #00236f; box-shadow: 0 0 0 2px rgba(0,35,111,0.1); }
      .slide-panel { transition: transform 0.3s ease-in-out; }
      .slide-panel.open { transform: translateX(0); }
      .slide-panel.closed { transform: translateX(100%); }
      .role-btn.active {
        border-color: #1e3a8a;
        background-color: #dce2f3;
        color: #00164e;
      }
      .role-btn.active .material-symbols-outlined {
        font-variation-settings: 'FILL' 1;
        color: #1e3a8a;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
